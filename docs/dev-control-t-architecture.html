<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev-Control-T Architecture</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #121826;
      --layer-execution: #1a3a4a;
      --layer-routing: #2a4a5a;
      --layer-engine: #3a5a6a;
      --layer-service: #4a6a7a;
      --layer-display: #5a7a8a;
      --accent-agent: #00d4aa;
      --accent-human: #ff6b9d;
      --accent-system: #7c3aed;
      --accent-pipeline: #f59e0b;
      --accent-sync: #06b6d4;
      --text-primary: #e8f0f8;
      --text-secondary: #94a8b8;
      --border-glow: rgba(0, 212, 170, 0.3);
      --gradient-mesh: radial-gradient(ellipse at 20% 80%, rgba(0, 212, 170, 0.15) 0%, transparent 50%),
                       radial-gradient(ellipse at 80% 20%, rgba(124, 58, 237, 0.1) 0%, transparent 50%),
                       radial-gradient(ellipse at 50% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 60%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gradient-mesh);
      pointer-events: none;
    }

    .container {
      max-width: 1400px;
      width: 100%;
      position: relative;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
    }

    .title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 400;
      letter-spacing: 1px;
    }

    .core-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 212, 170, 0.1);
      border: 1px solid var(--accent-agent);
      padding: 6px 16px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--accent-agent);
      margin-top: 12px;
    }

    .diagram-wrapper {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 30px;
      border: 1px solid rgba(148, 168, 184, 0.1);
      position: relative;
      overflow: hidden;
    }

    .diagram-wrapper::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-agent), transparent);
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Layer box styles */
    .layer-box {
      fill: var(--bg-secondary);
      stroke-width: 2;
      rx: 8;
    }

    .layer-label {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 14px;
      fill: var(--text-primary);
      letter-spacing: 1px;
    }

    .layer-number {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 10px;
      fill: var(--text-secondary);
    }

    /* Component styles */
    .component-box {
      rx: 6;
      stroke-width: 1.5;
    }

    .component-label {
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 11px;
      fill: var(--text-primary);
    }

    .executor-label {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 12px;
    }

    /* Arrow styles */
    .flow-arrow {
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrowhead);
    }

    .arrow-head {
      fill: var(--text-secondary);
    }

    /* Right side modules */
    .right-module {
      rx: 8;
      stroke-width: 2;
    }

    .right-label {
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 12px;
      fill: var(--text-primary);
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-top: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    /* Animations */
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    @keyframes flow-animate {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }

    .animated-flow {
      stroke-dasharray: 8 4;
      animation: flow-animate 1s linear infinite;
    }

    .glow-line {
      animation: pulse-glow 2s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">Dev-Control-T Architecture</div>
      <div class="subtitle">Agent-Centric Multi-Role Execution Platform</div>
      <div class="core-badge">
        <span>◆</span> Agent-Centric · Three-Role Model
      </div>
    </div>

    <div class="diagram-wrapper">
      <svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
        <!-- Definitions -->
        <defs>
          <!-- Arrow marker -->
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="arrow-head"/>
          </marker>

          <!-- Gradient for layers -->
          <linearGradient id="grad-execution" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1a3a4a;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#0d2833;stop-opacity:1"/>
          </linearGradient>

          <linearGradient id="grad-routing" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2a4a5a;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#163d4d;stop-opacity:1"/>
          </linearGradient>

          <linearGradient id="grad-engine" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3a5a6a;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#1f4a5a;stop-opacity:1"/>
          </linearGradient>

          <linearGradient id="grad-service" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4a6a7a;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#2a5a6a;stop-opacity:1"/>
          </linearGradient>

          <linearGradient id="grad-display" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#5a7a8a;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#3a6a7a;stop-opacity:1"/>
          </linearGradient>

          <!-- Glow filter -->
          <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <!-- Background grid pattern -->
        <g opacity="0.05">
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4a6a7a" stroke-width="0.5"/>
          </pattern>
          <rect width="100%" height="100%" fill="url(#grid)"/>
        </g>

        <!-- Left side container (80% width) -->
        <g transform="translate(30, 30)">

          <!-- Layer 5: Display Layer (Top) -->
          <g transform="translate(0, 40)">
            <rect x="0" y="0" width="940" height="110" fill="url(#grad-display)" stroke="#6a8a9a" class="layer-box"/>
            <text x="15" y="25" class="layer-label">LAYER 5</text>
            <text x="85" y="25" class="layer-number">DISPLAY</text>

            <!-- React + Vite badge -->
            <g transform="translate(15, 45)">
              <rect width="80" height="20" fill="rgba(0, 212, 170, 0.2)" stroke="#00d4aa" rx="4"/>
              <text x="40" y="14" fill="#00d4aa" font-family="JetBrains Mono" font-size="10" text-anchor="middle">React + Vite</text>
            </g>

            <!-- Display components -->
            <g transform="translate(110, 40)">
              <rect x="0" y="0" width="120" height="55" fill="#0d2833" stroke="#00d4aa" class="component-box"/>
              <text x="60" y="25" class="component-label" fill="#00d4aa" text-anchor="middle">Task Page</text>
              <text x="60" y="42" font-size="9" fill="#6a8a9a" text-anchor="middle">任务管理</text>
            </g>

            <g transform="translate(240, 40)">
              <rect x="0" y="0" width="120" height="55" fill="#0d2833" stroke="#00d4aa" class="component-box"/>
              <text x="60" y="25" class="component-label" fill="#00d4aa" text-anchor="middle">Agent Page</text>
              <text x="60" y="42" font-size="9" fill="#6a8a9a" text-anchor="middle">Agent 管理</text>
            </g>

            <g transform="translate(370, 40)">
              <rect x="0" y="0" width="120" height="55" fill="#0d2833" stroke="#f59e0b" class="component-box"/>
              <text x="60" y="25" class="component-label" fill="#f59e0b" text-anchor="middle">Pipeline Page</text>
              <text x="60" y="42" font-size="9" fill="#6a8a9a" text-anchor="middle">流水线管理</text>
            </g>

            <g transform="translate(500, 40)">
              <rect x="0" y="0" width="100" height="55" fill="#0d2833" stroke="#06b6d4" class="component-box"/>
              <text x="50" y="25" class="component-label" fill="#06b6d4" text-anchor="middle">State Mgmt</text>
              <text x="50" y="42" font-size="9" fill="#6a8a9a" text-anchor="middle">状态管理</text>
            </g>

            <g transform="translate(610, 40)">
              <rect x="0" y="0" width="100" height="55" fill="#0d2833" stroke="#7c3aed" class="component-box"/>
              <text x="50" y="25" class="component-label" fill="#7c3aed" text-anchor="middle">API Client</text>
              <text x="50" y="42" font-size="9" fill="#6a8a9a" text-anchor="middle">API 调用</text>
            </g>

            <g transform="translate(720, 40)">
              <rect x="0" y="0" width="100" height="55" fill="#0d2833" stroke="#94a8b8" class="component-box"/>
              <text x="50" y="25" class="component-label" fill="#94a8b8" text-anchor="middle">UI Kit</text>
              <text x="50" y="42" font-size="9" fill="#6a8a9a" text-anchor="middle">组件库</text>
            </g>
          </g>

          <!-- Layer 4: Service Layer -->
          <g transform="translate(0, 170)">
            <rect x="0" y="0" width="940" height="100" fill="url(#grad-service)" stroke="#5a7a8a" class="layer-box"/>
            <text x="15" y="25" class="layer-label">LAYER 4</text>
            <text x="85" y="25" class="layer-number">SERVICE</text>

            <!-- Service components -->
            <g transform="translate(110, 35)">
              <rect x="0" y="0" width="180" height="50" fill="#1a3a4a" stroke="#06b6d4" class="component-box"/>
              <text x="90" y="22" class="component-label" fill="#06b6d4" text-anchor="middle">Express Routers</text>
              <text x="90" y="38" font-size="9" fill="#4a6a7a" text-anchor="middle">API 路由层</text>
            </g>

            <g transform="translate(300, 35)">
              <rect x="0" y="0" width="150" height="50" fill="#1a3a4a" stroke="#7c3aed" class="component-box"/>
              <text x="75" y="22" class="component-label" fill="#7c3aed" text-anchor="middle">SQLite</text>
              <text x="75" y="38" font-size="9" fill="#4a6a7a" text-anchor="middle">持久化存储</text>
            </g>

            <g transform="translate(460, 35)">
              <rect x="0" y="0" width="200" height="50" fill="#1a3a4a" stroke="#00d4aa" class="component-box"/>
              <text x="100" y="22" class="component-label" fill="#00d4aa" text-anchor="middle">Agent Sync Service</text>
              <text x="100" y="38" font-size="9" fill="#4a6a7a" text-anchor="middle">Openflow Agent 同步</text>
            </g>
          </g>

          <!-- Layer 3: Pipeline Engine -->
          <g transform="translate(0, 290)">
            <rect x="0" y="0" width="940" height="110" fill="url(#grad-engine)" stroke="#4a6a7a" class="layer-box"/>
            <text x="15" y="25" class="layer-label">LAYER 3</text>
            <text x="85" y="25" class="layer-number">ENGINE</text>

            <!-- Pipeline Engine label -->
            <g transform="translate(15, 45)">
              <rect width="140" height="55" fill="rgba(245, 158, 11, 0.2)" stroke="#f59e0b" rx="6"/>
              <text x="70" y="22" fill="#f59e0b" font-family="JetBrains Mono" font-size="11" text-anchor="middle">Pipeline Engine</text>
              <text x="70" y="42" font-size="9" fill="#4a6a7a" text-anchor="middle">编排引擎</text>
            </g>

            <!-- Engine components -->
            <g transform="translate(170, 45)">
              <rect x="0" y="0" width="150" height="55" fill="#0d2833" stroke="#f59e0b" class="component-box"/>
              <text x="75" y="25" class="component-label" fill="#f59e0b" text-anchor="middle">Pipeline Executor</text>
              <text x="75" y="42" font-size="9" fill="#4a6a7a" text-anchor="middle">执行器</text>
            </g>

            <g transform="translate(330, 45)">
              <rect x="0" y="0" width="150" height="55" fill="#0d2833" stroke="#f59e0b" class="component-box"/>
              <text x="75" y="25" class="component-label" fill="#f59e0b" text-anchor="middle">States Machine</text>
              <text x="75" y="42" font-size="9" fill="#4a6a7a" text-anchor="middle">状态机</text>
            </g>

            <g transform="translate(490, 45)">
              <rect x="0" y="0" width="140" height="55" fill="#0d2833" stroke="#f59e0b" class="component-box"/>
              <text x="70" y="25" class="component-label" fill="#f59e0b" text-anchor="middle">Schedule</text>
              <text x="70" y="42" font-size="9" fill="#4a6a7a" text-anchor="middle">调度器</text>
            </g>
          </g>

          <!-- Layer 2: Routing Layer -->
          <g transform="translate(0, 420)">
            <rect x="0" y="0" width="940" height="90" fill="url(#grad-routing)" stroke="#3a5a6a" class="layer-box"/>
            <text x="15" y="25" class="layer-label">LAYER 2</text>
            <text x="85" y="25" class="layer-number">ROUTING</text>

            <!-- Routing components -->
            <g transform="translate(170, 30)">
              <rect x="0" y="0" width="200" height="50" fill="#0d2833" stroke="#00d4aa" class="component-box"/>
              <text x="100" y="22" class="component-label" fill="#00d4aa" text-anchor="middle">Agent Router</text>
              <text x="100" y="38" font-size="9" fill="#3a5a6a" text-anchor="middle">Agent 路由分发</text>
            </g>

            <g transform="translate(380, 30)">
              <rect x="0" y="0" width="200" height="50" fill="#0d2833" stroke="#06b6d4" class="component-box"/>
              <text x="100" y="22" class="component-label" fill="#06b6d4" text-anchor="middle">Prompt Builder</text>
              <text x="100" y="38" font-size="9" fill="#3a5a6a" text-anchor="middle">上下文构建</text>
            </g>
          </g>

          <!-- Layer 1: Execution Layer (Bottom) - The Core -->
          <g transform="translate(0, 530)">
            <rect x="0" y="0" width="940" height="130" fill="url(#grad-execution)" stroke="#2a4a5a" class="layer-box"/>
            <text x="15" y="25" class="layer-label">LAYER 1</text>
            <text x="85" y="25" class="layer-number">EXECUTION</text>

            <!-- Three Role Model badge -->
            <g transform="translate(15, 45)">
              <rect width="140" height="75" fill="rgba(0, 212, 170, 0.15)" stroke="#00d4aa" stroke-width="2" rx="6"/>
              <text x="70" y="18" fill="#00d4aa" font-family="JetBrains Mono" font-size="10" text-anchor="middle">Three-Role Model</text>
              <text x="70" y="35" font-size="9" fill="#4a6a7a" text-anchor="middle">三角色执行</text>

              <!-- Role icons -->
              <g transform="translate(20, 50)">
                <circle cx="0" cy="0" r="8" fill="#00d4aa"/>
                <text x="0" y="4" font-family="JetBrains Mono" font-size="8" fill="#0a0e17" text-anchor="middle">A</text>
              </g>
              <g transform="translate(70, 50)">
                <circle cx="0" cy="0" r="8" fill="#ff6b9d"/>
                <text x="0" y="4" font-family="JetBrains Mono" font-size="8" fill="#0a0e17" text-anchor="middle">H</text>
              </g>
              <g transform="translate(120, 50)">
                <circle cx="0" cy="0" r="8" fill="#7c3aed"/>
                <text x="0" y="4" font-family="JetBrains Mono" font-size="8" fill="#0a0e17" text-anchor="middle">S</text>
              </g>
            </g>

            <!-- Executors -->
            <g transform="translate(170, 35)">
              <rect x="0" y="0" width="220" height="80" fill="#0d2833" stroke="#00d4aa" stroke-width="2" class="component-box" filter="url(#glow)"/>
              <text x="110" y="25" class="executor-label" fill="#00d4aa" text-anchor="middle">Agent Executor</text>
              <text x="110" y="42" font-size="9" fill="#4a6a7a" text-anchor="middle">执行 Agent 任务</text>
              <!-- Agent icon -->
              <g transform="translate(110, 62)">
                <polygon points="0,-8 8,0 0,8 -8,0" fill="#00d4aa" opacity="0.6"/>
              </g>
            </g>

            <g transform="translate(400, 35)">
              <rect x="0" y="0" width="220" height="80" fill="#0d2833" stroke="#ff6b9d" stroke-width="2" class="component-box"/>
              <text x="110" y="25" class="executor-label" fill="#ff6b9d" text-anchor="middle">Homer Executor</text>
              <text x="110" y="42" font-size="9" fill="#4a6a7a" text-anchor="middle">执行人类操作</text>
              <!-- Human icon -->
              <g transform="translate(110, 62)">
                <circle cx="0" cy="-5" r="5" fill="#ff6b9d" opacity="0.6"/>
                <line x1="0" y1="0" x2="0" y2="8" stroke="#ff6b9d" stroke-width="2" opacity="0.6"/>
              </g>
            </g>

            <g transform="translate(630, 35)">
              <rect x="0" y="0" width="220" height="80" fill="#0d2833" stroke="#7c3aed" stroke-width="2" class="component-box"/>
              <text x="110" y="25" class="executor-label" fill="#7c3aed" text-anchor="middle">System Executor</text>
              <text x="110" y="42" font-size="9" fill="#4a6a7a" text-anchor="middle">执行系统组件</text>
              <!-- System icon -->
              <g transform="translate(110, 62)">
                <rect x="-8" y="-4" width="16" height="8" fill="#7c3aed" opacity="0.6" rx="2"/>
              </g>
            </g>
          </g>

          <!-- Vertical flow arrows -->
          <g class="flow-arrows">
            <!-- Execution to Routing -->
            <path d="M 280 530 L 280 420" stroke="#00d4aa" class="flow-arrow animated-flow" opacity="0.7"/>
            <path d="M 510 530 L 510 420" stroke="#ff6b9d" class="flow-arrow animated-flow" opacity="0.7"/>
            <path d="M 740 530 L 740 420" stroke="#7c3aed" class="flow-arrow animated-flow" opacity="0.7"/>

            <!-- Routing to Engine -->
            <path d="M 270 420 L 270 400 L 270 400" stroke="#00d4aa" class="flow-arrow"/>
            <path d="M 480 420 L 480 400" stroke="#06b6d4" class="flow-arrow"/>

            <!-- Engine to Service -->
            <path d="M 245 290 L 245 270" stroke="#f59e0b" class="flow-arrow"/>
            <path d="M 405 290 L 405 270" stroke="#f59e0b" class="flow-arrow"/>
            <path d="M 560 290 L 560 270" stroke="#f59e0b" class="flow-arrow"/>

            <!-- Service to Display -->
            <path d="M 200 170 L 170 150" stroke="#06b6d4" class="flow-arrow"/>
            <path d="M 375 170 L 430 150" stroke="#7c3aed" class="flow-arrow"/>
            <path d="M 560 170 L 560 150" stroke="#00d4aa" class="flow-arrow"/>
          </g>

        </g>

        <!-- Right side modules (20% width) -->
        <g transform="translate(980, 30)">
          <rect x="0" y="0" width="180" height="620" fill="#121826" stroke="#3a5a6a" stroke-width="2" rx="8"/>

          <!-- Section header -->
          <text x="90" y="30" fill="#4a6a7a" font-family="JetBrains Mono" font-size="10" text-anchor="middle">SUPPORT MODULES</text>

          <!-- Pipeline Shared -->
          <g transform="translate(10, 50)">
            <rect x="0" y="0" width="160" height="150" fill="#0d2833" stroke="#f59e0b" stroke-width="1.5" rx="6"/>
            <text x="80" y="25" class="right-label" fill="#f59e0b" text-anchor="middle">Pipeline Shared</text>
            <text x="80" y="45" font-size="9" fill="#4a6a7a" text-anchor="middle">共享组件</text>

            <!-- Sub components -->
            <g transform="translate(15, 60)">
              <rect width="130" height="25" fill="rgba(245, 158, 11, 0.1)" stroke="#f59e0b" stroke-width="0.5" rx="3"/>
              <text x="65" y="17" font-size="9" fill="#f59e0b" text-anchor="middle">Utils & Helpers</text>
            </g>
            <g transform="translate(15, 90)">
              <rect width="130" height="25" fill="rgba(245, 158, 11, 0.1)" stroke="#f59e0b" stroke-width="0.5" rx="3"/>
              <text x="65" y="17" font-size="9" fill="#f59e0b" text-anchor="middle">Constants</text>
            </g>
            <g transform="translate(15, 120)">
              <rect width="130" height="25" fill="rgba(245, 158, 11, 0.1)" stroke="#f59e0b" stroke-width="0.5" rx="3"/>
              <text x="65" y="17" font-size="9" fill="#f59e0b" text-anchor="middle">Types</text>
            </g>
          </g>

          <!-- External Collaborators -->
          <g transform="translate(10, 220)">
            <rect x="0" y="0" width="160" height="180" fill="#0d2833" stroke="#00d4aa" stroke-width="1.5" rx="6"/>
            <text x="80" y="25" class="right-label" fill="#00d4aa" text-anchor="middle">External Agents</text>
